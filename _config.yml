title: 电商全链路运营知识库
description: 基于 PMP 五过程组框架的货架电商运营方法论
baseurl: "/ecommerce-knowledge-base"
url: "https://lupo168.github.io"

remote_theme: just-the-docs/just-the-docs

# 搜索
search_enabled: true
search:
  heading_level: 3
  previews: 3

# 侧边栏
nav_sort: case_insensitive

# 回到顶部
back_to_top: true
back_to_top_text: "回到顶部"

# 颜色主题
color_scheme: light

# 页脚
footer_content: "© 2026 电商全链路运营知识库 | Powered by <a href=\"https://github.com/just-the-docs/just-the-docs\">Just the Docs</a>"

# 数学公式（定价计算器会用到）
kramdown:
  math_engine: mathjax

# 插件
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# 排除不需要渲染的文件
exclude:
  - .gitignore
  - CHANGELOG.md
  - skill/
